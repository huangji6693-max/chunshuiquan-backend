spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://gondola.proxy.rlwy.net:36761/railway}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:AASwOkfKgTMlYXDwyJqMlaXxzymWlOOf}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    time-zone: Asia/Shanghai

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:dev-only-secret-key-change-in-production-min32chars}
  expiration: ${JWT_EXPIRATION:604800000}

cloudinary:
  url: ${CLOUDINARY_URL:cloudinary://api_key:api_secret@cloud_name}

agora:
  appId: ${AGORA_APP_ID:}
  appCertificate: ${AGORA_APP_CERTIFICATE:}

# CORS 允许的前端域名
cors:
  allowed-origins: ${CORS_ORIGINS:*}

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
